name: Release

# Triggered when a tag matching `v*.*.*` is pushed. Builds the Tauri
# installers on Linux, macOS, and Windows in parallel and uploads them
# as assets on the GitHub Release that already exists (or creates one).
#
# To cut a release: bump versions, commit, then:
#   git tag -a v1.2.3 -m "..."
#   git push origin v1.2.3
#
# The matrix produces:
#   - Linux:   .deb, .rpm, .AppImage  (x86_64)
#   - macOS:   .dmg, .app             (universal: x86_64 + aarch64)
#   - Windows: .msi, NSIS .exe        (x86_64)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  # Required for tauri-action to create / update the GitHub Release.
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            bundle_args: ""
          - os: macos-latest
            rust_target: universal-apple-darwin
            bundle_args: "--target universal-apple-darwin"
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            bundle_args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Tauri Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS builds need both targets.
          targets: ${{ matrix.os == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Cache Cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # linuxdeploy's bundled `strip` chokes on libraries built with
          # modern binutils' .relr.dyn sections (Arch, Fedora 40+, recent
          # Debian testing). The GitHub-hosted Ubuntu 24.04 runner ships
          # binutils 2.42 and exhibits the same issue, so we skip strip
          # in CI too. AppImage size is unchanged in practice.
          NO_STRIP: ${{ matrix.os == 'ubuntu-latest' && 'true' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Open-Code-RenPy-UI ${{ github.ref_name }}"
          releaseBody: |
            See [`CHANGELOG.md`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md)
            for the release notes.

            ## Downloads

            | Platform | File |
            |---|---|
            | Linux  | `.deb` / `.rpm` / `.AppImage` |
            | macOS  | `.dmg` (universal: Intel + Apple Silicon) |
            | Windows | `.msi` / NSIS `.exe` |
          releaseDraft: false
          prerelease: false
          projectPath: apps/desktop
          args: ${{ matrix.bundle_args }}
